<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Care Plan Generator (MVP)</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 0;
        background: #f5f5f7;
        color: #111827;
      }
      .container {
        max-width: 960px;
        margin: 40px auto;
        padding: 24px 28px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.25rem;
      }
      h2 {
        font-size: 1.1rem;
        margin-top: 2rem;
        margin-bottom: 0.5rem;
      }
      p.description {
        margin-top: 0;
        margin-bottom: 1.5rem;
        color: #4b5563;
      }
      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 20px;
        margin-bottom: 2rem;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field-full {
        grid-column: 1 / -1;
      }
      label {
        font-size: 0.9rem;
        font-weight: 600;
        color: #374151;
      }
      input[type="text"],
      textarea {
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        padding: 8px 10px;
        font-size: 0.95rem;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      input[type="text"]:focus,
      textarea:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 1px #2563eb33;
      }
      textarea {
        min-height: 80px;
        resize: vertical;
      }
      .actions {
        grid-column: 1 / -1;
        display: flex;
        justify-content: flex-start;
        gap: 12px;
        align-items: center;
        margin-top: 4px;
      }
      button[type="submit"] {
        background: #2563eb;
        color: #ffffff;
        border: none;
        border-radius: 999px;
        padding: 8px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        transition: background 0.15s ease, box-shadow 0.15s ease,
          transform 0.05s ease;
      }
      button[type="submit"]:hover {
        background: #1d4ed8;
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.45);
        transform: translateY(-1px);
      }
      button[type="submit"]:active {
        transform: translateY(0);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
      }
      .hint {
        font-size: 0.8rem;
        color: #6b7280;
      }
      pre.careplan-output {
        background: #0b1120;
        color: #e5e7eb;
        padding: 16px 18px;
        border-radius: 10px;
        font-size: 0.85rem;
        line-height: 1.45;
        overflow-x: auto;
        white-space: pre-wrap;
      }
      .card {
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        padding: 14px 16px;
        background: #f9fafb;
        margin-top: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Care Plan Generator — MVP</h1>
      <p class="description">
        输入最基本的病人信息和用药信息，点击提交后，同步生成一份简单的 Care
        Plan 文本并直接展示在页面下方。当前版本所有数据只保存在内存里。
      </p>

      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label for="patient_first_name">Patient First Name</label>
          <input
            type="text"
            id="patient_first_name"
            name="patient_first_name"
            required
          />
        </div>

        <div class="field">
          <label for="patient_last_name">Patient Last Name</label>
          <input
            type="text"
            id="patient_last_name"
            name="patient_last_name"
            required
          />
        </div>

        <div class="field field-full">
          <label for="diagnosis">Primary Diagnosis (free text for now)</label>
          <input type="text" id="diagnosis" name="diagnosis" required />
        </div>

        <div class="field field-full">
          <label for="medication_name">Medication Name</label>
          <input
            type="text"
            id="medication_name"
            name="medication_name"
            required
          />
        </div>

        <div class="field field-full">
          <label for="notes">Additional Notes (optional)</label>
          <textarea id="notes" name="notes"></textarea>
          <span class="hint">
            这里可以先随便写几句情况描述，真实项目里再扩展更多字段和验证规则。
          </span>
        </div>

        <div class="actions">
          <button type="submit">Generate Care Plan</button>
          <span class="hint">同步请求：会等“LLM”生成完毕再返回。</span>
        </div>
      </form>

      {% if careplan %}
      <h2>Generated Care Plan</h2>
      <div class="card">
        <pre class="careplan-output">{{ careplan.careplan_text }}</pre>
      </div>
      {% endif %}
    </div>
  </body>
</html>
