services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: careplan
      POSTGRES_USER: careplan
      POSTGRES_PASSWORD: careplan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careplan -d careplan"]
      interval: 3s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: careplan
      POSTGRES_USER: careplan
      POSTGRES_PASSWORD: careplan
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
